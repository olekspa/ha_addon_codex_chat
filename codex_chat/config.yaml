name: Codex Chat
version: 0.4.3
slug: codex_chat
description: Chat with Codex relay from Home Assistant (threads, history, resume, turns).
url: https://github.com/olekspa/ha_addon_codex_chat
image: ghcr.io/olekspa/lentus-agent-{arch}-codex_chat
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
homeassistant_api: true
panel_icon: mdi:chat-processing
panel_title: Codex Chat
panel_admin: false
ports: {}
ports_description: {}
options:
  relay_url: "http://192.168.1.100:8765"
  relay_token: ""
  mulsus_relay_url: "http://192.168.1.10:8765"
  mulsus_relay_token: ""
  admin_person_entity_id: "person.alex"
  mulsus_person_entity_id: "person.tetyana"
  lentus_agent_label: "Lentus"
  mulsus_agent_label: "Mulsus"
  default_wait: true
  wait_timeout: 120
  poll_interval: 1.0
  tts_enabled: false
  tts_service: "tts.speak"
  tts_entity_id: ""
  tts_media_player_entity_id: ""
  assist_enabled: false
  assist_agent_id: ""
  assist_language: ""
  notify_webhook_id: "lentus_agent_webhook"
schema:
  relay_url: str
  relay_token: password
  mulsus_relay_url: str
  mulsus_relay_token: password
  admin_person_entity_id: str
  mulsus_person_entity_id: str
  lentus_agent_label: str
  mulsus_agent_label: str
  default_wait: bool
  wait_timeout: int(10,900)
  poll_interval: float(0.2,5.0)
  tts_enabled: bool
  tts_service: str
  tts_entity_id: str
  tts_media_player_entity_id: str
  assist_enabled: bool
  assist_agent_id: str
  assist_language: str
  notify_webhook_id: str
