<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Codex Chat v__APP_VERSION__</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --panel: #ffffff;
      --ink: #17212b;
      --muted: #6b7280;
      --line: #d7d9dd;
      --accent: #0f766e;
      --accent-2: #115e59;
      --warn: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 10% 0%, #fff8e1 0%, var(--bg) 48%), var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    .app {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 12px;
      height: 100vh;
      padding: 12px;
    }
    .sidebar {
      position: relative;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.07);
      overflow: hidden;
    }
    .sidebar-header, .chat-header {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .chat-header {
      padding: 8px 10px;
    }
    .title { font-weight: 700; letter-spacing: 0.2px; font-size: 15px; }
    .toolbar { display: flex; gap: 8px; align-items: center; }
    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .chat-header .toolbar {
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .chat-header .toolbar button,
    .chat-header .toolbar select,
    .chat-header .toolbar input {
      padding-top: 5px;
      padding-bottom: 5px;
      font-size: 12px;
    }
    #cwdInput {
      min-width: 240px;
    }
    .toolbar input, .toolbar select {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }
    .threads { overflow: auto; height: calc(100% - 106px); }
    .thread-actions {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      background: #f8fafc;
    }
    .thread-actions button {
      padding: 7px 9px;
      font-size: 12px;
      border-radius: 8px;
    }
    .thread {
      padding: 11px 12px;
      border-bottom: 1px solid #eceef1;
      cursor: pointer;
      transition: background 140ms ease;
    }
    .thread:hover { background: #f8fafc; }
    .thread.active { background: #ecfeff; border-left: 3px solid var(--accent); padding-left: 9px; }
    .thread .preview { font-size: 13px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread .meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .chat {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100%;
    }
    .messages {
      padding: 14px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: linear-gradient(180deg, #f8fafc 0%, #ffffff 220px);
    }
    .msg {
      max-width: 860px;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid var(--line);
      line-height: 1.35;
      white-space: pre-wrap;
      box-shadow: 0 2px 7px rgba(15, 23, 42, 0.05);
    }
    .msg-content {
      white-space: normal;
      word-break: break-word;
    }
    .msg-content p {
      margin: 0 0 10px;
    }
    .msg-content p:last-child {
      margin-bottom: 0;
    }
    .msg-content h1,
    .msg-content h2,
    .msg-content h3 {
      margin: 0 0 8px;
      line-height: 1.25;
    }
    .msg-content h1 { font-size: 18px; }
    .msg-content h2 { font-size: 16px; }
    .msg-content h3 { font-size: 14px; }
    .msg-content blockquote {
      margin: 0 0 10px;
      padding: 8px 10px;
      border-left: 3px solid #99f6e4;
      background: #f0fdfa;
      color: #134e4a;
      border-radius: 6px;
    }
    .msg-content ul,
    .msg-content ol {
      margin: 0 0 10px 18px;
      padding: 0;
    }
    .msg-content li {
      margin: 0 0 4px;
    }
    .msg-content pre {
      margin: 0 0 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      background: #0f172a;
      color: #e2e8f0;
      overflow: auto;
      white-space: pre;
    }
    .msg-content pre code {
      white-space: pre;
      font-family: "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .msg-content .code-lang {
      margin-bottom: 6px;
      font-size: 11px;
      color: #93c5fd;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .msg-content code {
      font-family: "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 12px;
      background: #e2e8f0;
      border-radius: 6px;
      padding: 1px 5px;
    }
    .msg-content a {
      color: var(--accent-2);
      text-decoration: underline;
    }
    .msg.user { background: #f0fdfa; border-color: #99f6e4; align-self: flex-end; }
    .msg.agent { background: #f8fafc; align-self: flex-start; }
    .msg.pending { border-style: dashed; opacity: 0.9; }
    .msg.failed { border-color: #fca5a5; background: #fff1f2; }
    .composer {
      border-top: 1px solid var(--line);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: start;
    }
    textarea {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      color: var(--ink);
    }
    textarea:focus {
      outline: 2px solid #99f6e4;
      outline-offset: 1px;
      border-color: #5eead4;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: filter 120ms ease, transform 120ms ease;
    }
    button:hover { filter: brightness(1.06); }
    button:active { transform: translateY(1px); }
    button.secondary { background: #334155; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .status { color: var(--muted); font-size: 12px; }
    .error { color: var(--warn); }
    .mobile-only { display: none; }
    .drawer-close {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 2;
    }
    @media (max-width: 980px) {
      body {
        min-height: 100dvh;
      }
      .app {
        grid-template-columns: 1fr;
        height: 100dvh;
        min-height: 100dvh;
        gap: 8px;
        padding: 8px;
      }
      .panel {
        min-height: 0;
      }
      .chat {
        min-height: 0;
      }
      .chat-header {
        align-items: flex-start;
        padding: 8px;
      }
      .chat-header .toolbar {
        justify-content: flex-start;
      }
      .header-actions {
        display: none;
      }
      body.mobile-actions-open .header-actions {
        display: flex;
        position: fixed;
        top: 56px;
        left: 8px;
        right: 8px;
        z-index: 26;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 10px 24px rgba(0,0,0,0.16);
      }
      .chat-header .toolbar button,
      .chat-header .toolbar select,
      .chat-header .toolbar input {
        max-width: 100%;
      }
      .messages {
        padding: 10px;
      }
      .msg {
        max-width: 100%;
      }
      .composer {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .composer textarea {
        grid-column: 1 / -1;
        min-height: 96px;
      }
      .composer button {
        width: 100%;
      }
      .mobile-only {
        display: inline-block;
      }
      .sidebar {
        display: none;
      }
      body.thread-menu-open .sidebar {
        display: block;
        position: fixed;
        top: 8px;
        left: 8px;
        right: 8px;
        bottom: 8px;
        z-index: 30;
        border-radius: 12px;
        overflow: hidden;
      }
      body.thread-menu-open::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
        z-index: 20;
      }
      body.thread-menu-open .drawer-close {
        display: inline-block;
      }
      .threads {
        height: calc(100% - 106px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="sidebarPanel" class="panel sidebar">
      <button id="closeThreadsBtn" class="secondary drawer-close">Close</button>
      <div class="sidebar-header">
        <div class="title">Threads</div>
        <div class="toolbar">
          <input id="searchInput" placeholder="Search" />
          <button id="refreshBtn" class="secondary">Refresh</button>
        </div>
      </div>
      <div class="thread-actions">
        <button id="newThreadBtn" class="secondary">New Thread</button>
      </div>
      <div id="threads" class="threads"></div>
    </section>

    <section class="panel chat">
      <div class="chat-header">
        <div>
        <div class="title">Codex Chat v__APP_VERSION__</div>
          <div id="status" class="status">Loading...</div>
        </div>
        <div class="toolbar">
          <button id="openThreadsBtn" class="secondary mobile-only">Threads</button>
          <button id="mobileActionsBtn" class="secondary mobile-only">Actions</button>
          <div id="headerActions" class="header-actions">
            <input id="cwdInput" placeholder="cwd (absolute path)" />
            <label><input id="autoRefreshToggle" type="checkbox" checked /> Auto</label>
            <select id="autoRefreshInterval">
              <option value="1.5">1.5s</option>
              <option value="2.5" selected>2.5s</option>
              <option value="5">5s</option>
            </select>
            <label><input id="ttsAutoToggle" type="checkbox" /> TTS</label>
          </div>
        </div>
      </div>
      <div id="messages" class="messages"></div>
      <div class="composer">
        <textarea id="input" placeholder="Send message to selected thread..."></textarea>
        <button id="resumeBtn" class="secondary">Resume</button>
        <button id="sendBtn">Send</button>
        <button id="retryBtn" class="secondary" style="display:none;">Retry</button>
      </div>
    </section>
  </div>

  <script>
    const el = {
      threads: document.getElementById('threads'),
      messages: document.getElementById('messages'),
      status: document.getElementById('status'),
      input: document.getElementById('input'),
      refreshBtn: document.getElementById('refreshBtn'),
      sidebarPanel: document.getElementById('sidebarPanel'),
      openThreadsBtn: document.getElementById('openThreadsBtn'),
      mobileActionsBtn: document.getElementById('mobileActionsBtn'),
      headerActions: document.getElementById('headerActions'),
      closeThreadsBtn: document.getElementById('closeThreadsBtn'),
      searchInput: document.getElementById('searchInput'),
      newThreadBtn: document.getElementById('newThreadBtn'),
      resumeBtn: document.getElementById('resumeBtn'),
      sendBtn: document.getElementById('sendBtn'),
      retryBtn: document.getElementById('retryBtn'),
      autoRefreshToggle: document.getElementById('autoRefreshToggle'),
      autoRefreshInterval: document.getElementById('autoRefreshInterval'),
      ttsAutoToggle: document.getElementById('ttsAutoToggle'),
      cwdInput: document.getElementById('cwdInput'),
    };

    function isMobileLayout() {
      return window.matchMedia('(max-width: 980px)').matches;
    }

    function closeThreadMenu() {
      document.body.classList.remove('thread-menu-open');
    }

    const forbiddenActionLabels = new Set([
      'speak last',
      'assist input',
      'assist last',
      'pin',
      'archive',
      'unarchive',
      'materialize',
    ]);
    const forbiddenActionIds = new Set([
      'speaklastbtn',
      'assistinputbtn',
      'assistlastbtn',
      'pinbtn',
      'archivebtn',
      'unarchivebtn',
      'materializebtn',
    ]);

    function purgeForbiddenButtons() {
      document.querySelectorAll('button').forEach((btn) => {
        const id = (btn.id || '').trim().toLowerCase();
        const label = (btn.textContent || '').trim().toLowerCase();
        if (forbiddenActionIds.has(id) || forbiddenActionLabels.has(label)) {
          btn.remove();
        }
      });
    }

    function closeMobileActions() {
      document.body.classList.remove('mobile-actions-open');
    }

    function toggleMobileActions() {
      if (!isMobileLayout()) return;
      document.body.classList.toggle('mobile-actions-open');
    }

    function openThreadMenu() {
      if (!isMobileLayout()) return;
      closeMobileActions();
      document.body.classList.add('thread-menu-open');
    }

    const state = {
      threads: [],
      selectedThreadId: null,
      requestedThreadId: null,
      busy: false,
      autoRefreshTimer: null,
      lastThreadUpdatedAt: 0,
      lastFailedMessage: null,
      cwd: '',
      tts: {
        enabled: false,
        service: 'tts.speak',
        entity_id: '',
        media_player_entity_id: '',
      },
    };
    const ACTIVE_TURN_POLL_MS = 1000;
    const ACTIVE_TURN_MAX_SECONDS = 15 * 60;
    const MAX_TRANSIENT_POLL_ERRORS = 6;
    const SSE_REFRESH_DEBOUNCE_MS = 180;
    const SSE_MAX_ERRORS = 4;

    function setStatus(text, isError = false) {
      el.status.textContent = text;
      el.status.className = isError ? 'status error' : 'status';
    }

    function getConfiguredCwd() {
      const value = (state.cwd || '').trim();
      return value.startsWith('/') ? value : '';
    }

    function saveCwd(value) {
      state.cwd = (value || '').trim();
      try {
        localStorage.setItem('codexChat.cwd', state.cwd);
      } catch (_err) {
        // Ignore storage failures.
      }
    }

    async function api(path, options = {}) {
      const safePath = path.startsWith('/') ? `.${path}` : path;
      const res = await fetch(safePath, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        },
      });
      const txt = await res.text();
      let data;
      try { data = txt ? JSON.parse(txt) : {}; } catch { data = { raw: txt }; }
      if (!res.ok) {
        const detail = (data && typeof data === 'object')
          ? (data.detail ?? data.error ?? data.raw ?? txt)
          : (data || txt);
        throw new Error(errorText(detail));
      }
      return data;
    }

    function errorText(value) {
      if (typeof value === 'string') return value;
      if (value && typeof value === 'object') {
        try {
          return JSON.stringify(value);
        } catch (_err) {
          return String(value);
        }
      }
      return String(value || 'Unknown error');
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function normalizeTurnStatus(status) {
      return String(status || '').trim().toLowerCase();
    }

    function isTerminalTurnStatus(status) {
      const s = normalizeTurnStatus(status);
      return s === 'completed' || s === 'failed' || s === 'error' || s === 'cancelled' || s === 'canceled';
    }

    function getTurnById(threadData, turnId) {
      const turns = threadData?.thread?.turns;
      if (!Array.isArray(turns) || !turnId) return null;
      for (const turn of turns) {
        if (turn && turn.id === turnId) return turn;
      }
      return null;
    }

    function countAgentMessages(turn) {
      const items = Array.isArray(turn?.items) ? turn.items : [];
      let count = 0;
      for (const item of items) {
        if (item?.type === 'agentMessage') count += 1;
      }
      return count;
    }

    function threadRenderSignature(threadData) {
      const turns = threadData?.thread?.turns;
      if (!Array.isArray(turns)) return '';
      const parts = [];
      for (const turn of turns) {
        if (!turn || typeof turn !== 'object') continue;
        const items = Array.isArray(turn.items) ? turn.items : [];
        const last = items.length ? items[items.length - 1] : null;
        const lastId = last && typeof last === 'object' ? String(last.id || '') : '';
        parts.push(`${String(turn.id || '')}:${String(turn.status || '')}:${items.length}:${lastId}`);
      }
      return parts.join('|');
    }

    async function monitorTurnProgressPolling(threadId, turnId) {
      const startedAt = Date.now();
      let lastSig = '';
      let transientErrors = 0;

      while (true) {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        if (elapsed > ACTIVE_TURN_MAX_SECONDS) {
          throw new Error(`Turn is still running after ${ACTIVE_TURN_MAX_SECONDS}s. It may still complete in background.`);
        }

        try {
          const data = await api(`./api/threads/${threadId}?includeTurns=true`);
          transientErrors = 0;
          const sig = threadRenderSignature(data);
          if (sig !== lastSig) {
            renderThreadMessages(data);
            lastSig = sig;
          }

          const turn = getTurnById(data, turnId);
          if (turn) {
            const status = normalizeTurnStatus(turn.status) || 'in_progress';
            const agentCount = countAgentMessages(turn);
            if (isTerminalTurnStatus(status)) {
              return data;
            }
            setStatus(`Running (${elapsed}s) • ${status}${agentCount ? ` • ${agentCount} update(s)` : ''}`);
          } else {
            setStatus(`Turn queued (${elapsed}s)...`);
          }
        } catch (err) {
          transientErrors += 1;
          if (transientErrors > MAX_TRANSIENT_POLL_ERRORS) {
            throw err;
          }
          setStatus(`Temporary connection issue (${transientErrors}/${MAX_TRANSIENT_POLL_ERRORS}), retrying...`);
        }

        await sleep(ACTIVE_TURN_POLL_MS);
      }
    }

    async function monitorTurnProgressSse(threadId, turnId) {
      const startedAt = Date.now();
      let lastSig = '';
      let transientErrors = 0;
      let streamErrors = 0;
      let finished = false;
      let eventSource = null;
      let refreshTimer = null;
      let fallbackPollTimer = null;
      let refreshInFlight = false;

      const closeAll = () => {
        finished = true;
        if (refreshTimer) {
          clearTimeout(refreshTimer);
          refreshTimer = null;
        }
        if (fallbackPollTimer) {
          clearInterval(fallbackPollTimer);
          fallbackPollTimer = null;
        }
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
      };

      const scheduleRefresh = (delayMs = 0) => {
        if (finished) return;
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(() => {
          refreshTimer = null;
          refreshNow().catch(() => {
            // Errors are handled in refreshNow.
          });
        }, Math.max(0, delayMs));
      };

      const refreshNow = async () => {
        if (finished || refreshInFlight) return null;
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        if (elapsed > ACTIVE_TURN_MAX_SECONDS) {
          closeAll();
          throw new Error(`Turn is still running after ${ACTIVE_TURN_MAX_SECONDS}s. It may still complete in background.`);
        }

        refreshInFlight = true;
        try {
          const data = await api(`./api/threads/${threadId}?includeTurns=true`);
          transientErrors = 0;
          const sig = threadRenderSignature(data);
          if (sig !== lastSig) {
            renderThreadMessages(data);
            lastSig = sig;
          }

          const turn = getTurnById(data, turnId);
          if (turn) {
            const status = normalizeTurnStatus(turn.status) || 'in_progress';
            const agentCount = countAgentMessages(turn);
            if (isTerminalTurnStatus(status)) {
              closeAll();
              return data;
            }
            setStatus(`Streaming (${elapsed}s) • ${status}${agentCount ? ` • ${agentCount} update(s)` : ''}`);
          } else {
            setStatus(`Streaming (${elapsed}s) • waiting for turn...`);
          }
        } catch (err) {
          transientErrors += 1;
          if (transientErrors > MAX_TRANSIENT_POLL_ERRORS) {
            closeAll();
            throw err;
          }
          setStatus(`Temporary connection issue (${transientErrors}/${MAX_TRANSIENT_POLL_ERRORS}), retrying...`);
        } finally {
          refreshInFlight = false;
        }
        return null;
      };

      return new Promise((resolve, reject) => {
        const timeoutParam = Math.min(ACTIVE_TURN_MAX_SECONDS + 60, 3600);
        const qp = new URLSearchParams({
          timeout: String(timeoutParam),
          heartbeat: '12',
        });
        if (turnId) qp.set('turnId', turnId);

        eventSource = new EventSource(`./api/threads/${encodeURIComponent(threadId)}/events?${qp.toString()}`);
        eventSource.addEventListener('ready', () => {
          setStatus('Streaming connected');
          scheduleRefresh(0);
        });
        eventSource.addEventListener('relay_notification', (evt) => {
          try {
            const payload = JSON.parse(evt.data || '{}');
            const method = String(payload?.method || '').trim();
            const elapsed = Math.floor((Date.now() - startedAt) / 1000);
            if (method) {
              setStatus(`Streaming (${elapsed}s) • ${method}`);
            }
          } catch (_err) {
            // Ignore malformed event payloads.
          }
          scheduleRefresh(SSE_REFRESH_DEBOUNCE_MS);
        });
        eventSource.addEventListener('relay_error', (evt) => {
          streamErrors += 1;
          if (streamErrors > SSE_MAX_ERRORS) {
            closeAll();
            reject(new Error('SSE stream reported repeated relay errors.'));
            return;
          }
          try {
            const payload = JSON.parse(evt.data || '{}');
            setStatus(`SSE relay error (${streamErrors}/${SSE_MAX_ERRORS}): ${errorText(payload)}`);
          } catch (_err) {
            setStatus(`SSE relay error (${streamErrors}/${SSE_MAX_ERRORS})`);
          }
          scheduleRefresh(SSE_REFRESH_DEBOUNCE_MS);
        });
        eventSource.onerror = () => {
          streamErrors += 1;
          if (streamErrors > SSE_MAX_ERRORS) {
            closeAll();
            reject(new Error('SSE connection became unstable.'));
            return;
          }
          setStatus(`SSE reconnecting (${streamErrors}/${SSE_MAX_ERRORS})...`);
          scheduleRefresh(SSE_REFRESH_DEBOUNCE_MS);
        };

        fallbackPollTimer = setInterval(() => {
          scheduleRefresh(0);
        }, Math.max(1200, ACTIVE_TURN_POLL_MS * 2));

        refreshNow()
          .then((data) => {
            if (data) {
              resolve(data);
              return;
            }
            const waiter = async () => {
              if (finished) return;
              try {
                const maybeDone = await refreshNow();
                if (maybeDone) {
                  resolve(maybeDone);
                  return;
                }
              } catch (err) {
                reject(err);
                return;
              }
              setTimeout(waiter, Math.max(600, ACTIVE_TURN_POLL_MS));
            };
            setTimeout(waiter, Math.max(600, ACTIVE_TURN_POLL_MS));
          })
          .catch((err) => {
            reject(err);
          });
      });
    }

    async function monitorTurnProgress(threadId, turnId) {
      if (typeof EventSource !== 'function') {
        return monitorTurnProgressPolling(threadId, turnId);
      }
      try {
        return await monitorTurnProgressSse(threadId, turnId);
      } catch (_streamErr) {
        setStatus('SSE degraded; falling back to polling...');
        return monitorTurnProgressPolling(threadId, turnId);
      }
    }

    function renderThreads() {
      el.threads.innerHTML = '';
      const q = (el.searchInput.value || '').trim().toLowerCase();
      const sorted = [...state.threads].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      for (const t of sorted) {
        const preview = (t.preview || '(no preview)');
        if (q && !preview.toLowerCase().includes(q) && !t.id.toLowerCase().includes(q)) continue;
        const div = document.createElement('div');
        div.className = 'thread' + (t.id === state.selectedThreadId ? ' active' : '');
        const dt = new Date((t.updatedAt || t.createdAt || 0) * 1000);
        div.innerHTML = `
          <div class="preview">${preview.replaceAll('<','&lt;')}</div>
          <div class="meta">${t.id.slice(0,8)} • ${t.source || 'unknown'} • ${isNaN(dt) ? '' : dt.toLocaleString()}</div>
        `;
        div.onclick = async () => {
          state.selectedThreadId = t.id;
          renderThreads();
          await loadThread(t.id);
          closeThreadMenu();
        };
        el.threads.appendChild(div);
      }
    }

    function escapeHtml(text) {
      return (text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderRichText(text) {
      const source = String(text || '').replace(/\r\n/g, '\n');
      let escaped = escapeHtml(source);

      const codeBlocks = [];
      escaped = escaped.replace(/```[ \t]*([a-zA-Z0-9_-]+)?\n([\s\S]*?)```/g, (_m, lang, code) => {
        const idx = codeBlocks.length;
        const langLabel = lang ? `<div class="code-lang">${lang}</div>` : '';
        codeBlocks.push(`<pre>${langLabel}<code>${code}</code></pre>`);
        return `@@CODEBLOCK_${idx}@@`;
      });

      escaped = escaped.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_m, label, url) => {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`;
      });
      escaped = escaped.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      escaped = escaped.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      escaped = escaped.replace(/(^|[^\*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
      escaped = escaped.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      escaped = escaped.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      escaped = escaped.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      escaped = escaped.replace(/^&gt;\s?(.*)$/gm, '<blockquote>$1</blockquote>');
      escaped = escaped.replace(/(?:^|\n)([-*]\s.+(?:\n[-*]\s.+)*)/g, (full, list) => {
        const items = list
          .split('\n')
          .map((line) => line.replace(/^[-*]\s+/, '').trim())
          .map((item) => `<li>${item}</li>`)
          .join('');
        const prefix = full.startsWith('\n') ? '\n' : '';
        return `${prefix}<ul>${items}</ul>`;
      });

      const paragraphs = escaped
        .split(/\n{2,}/)
        .map((block) => block.trim())
        .filter(Boolean)
        .map((block) => {
          if (block.startsWith('<h1>') || block.startsWith('<h2>') || block.startsWith('<h3>')
            || block.startsWith('<pre>') || block.startsWith('<blockquote>') || block.startsWith('<ul>')) {
            return block;
          }
          return `<p>${block.replace(/\n/g, '<br>')}</p>`;
        })
        .join('');

      return paragraphs.replace(/@@CODEBLOCK_(\d+)@@/g, (_m, indexStr) => {
        const index = Number(indexStr);
        return Number.isFinite(index) ? (codeBlocks[index] || '') : '';
      });
    }

    function pushMessage(type, text, extraClass = '', opts = {}) {
      const rich = Boolean(opts.rich);
      const d = document.createElement('div');
      d.className = 'msg ' + (type === 'user' ? 'user' : 'agent') + (extraClass ? ` ${extraClass}` : '');
      const content = document.createElement('div');
      content.className = 'msg-content';
      if (rich) {
        content.innerHTML = renderRichText(text || '');
      } else {
        content.textContent = text || '';
      }
      d.appendChild(content);
      el.messages.appendChild(d);
      el.messages.scrollTop = el.messages.scrollHeight;
    }

    function renderThreadMessages(threadData) {
      el.messages.innerHTML = '';
      const turns = threadData?.thread?.turns || [];
      for (const turn of turns) {
        for (const item of turn.items || []) {
          if (item.type === 'userMessage') {
            const joined = (item.content || []).map(c => c.text || '').join('\n');
            pushMessage('user', joined);
          } else if (item.type === 'agentMessage') {
            pushMessage('agent', item.text || '', '', { rich: true });
          }
        }
        if (turn.status && turn.status !== 'completed') {
          pushMessage('agent', `[turn ${turn.status}]`);
        }
      }
    }

    function extractLastAgentText(threadData) {
      const turns = threadData?.thread?.turns || [];
      for (let i = turns.length - 1; i >= 0; i--) {
        const turn = turns[i];
        const items = turn?.items || [];
        for (let j = items.length - 1; j >= 0; j--) {
          const item = items[j];
          if (item?.type === 'agentMessage' && item?.text) return String(item.text);
        }
      }
      return '';
    }

    async function speakText(message) {
      const text = (message || '').trim();
      if (!text) return;
      await api('./api/ha/tts', {
        method: 'POST',
        body: JSON.stringify({
          message: text,
          service: state.tts.service || undefined,
          entity_id: state.tts.entity_id || undefined,
          media_player_entity_id: state.tts.media_player_entity_id || undefined,
        }),
      });
    }

    async function loadTtsConfig() {
      try {
        const cfg = await api('./api/ha/tts/config');
        state.tts = {
          enabled: !!cfg.enabled,
          service: cfg.service || 'tts.speak',
          entity_id: cfg.entity_id || '',
          media_player_entity_id: cfg.media_player_entity_id || '',
        };
        el.ttsAutoToggle.checked = state.tts.enabled;
      } catch (_err) {
        // Ignore when unavailable; chat can still function without TTS.
      }
    }

    async function loadThreads() {
      setStatus('Loading threads...');
      const cwd = getConfiguredCwd();
      const suffix = cwd ? `&cwd=${encodeURIComponent(cwd)}` : '';
      const fetchThreads = async () => {
        const data = await api(`./api/threads?limit=50&sourceKinds=vscode${suffix}`);
        state.threads = data.data || [];
      };
      await fetchThreads();
      if (state.requestedThreadId) {
        const exists = state.threads.some((t) => t.id === state.requestedThreadId);
        if (!exists) {
          try {
            await api(`./api/threads/${state.requestedThreadId}/materialize`, { method: 'POST' });
            await fetchThreads();
          } catch (_err) {
            // If materialization fails, continue with default selection behavior.
          }
        }
        if (state.threads.some((t) => t.id === state.requestedThreadId)) {
          state.selectedThreadId = state.requestedThreadId;
        }
      }
      state.lastThreadUpdatedAt = state.threads.reduce((m, t) => Math.max(m, t.updatedAt || 0), 0);
      if (!state.selectedThreadId && state.threads.length) {
        state.selectedThreadId = state.threads[0].id;
      }
      renderThreads();
      if (state.selectedThreadId) {
        await loadThread(state.selectedThreadId);
      } else {
        setStatus('No threads found. Create a new thread.');
      }
    }

    async function loadThread(threadId, silent = false) {
      if (!silent) setStatus('Loading thread...');
      const data = await api(`./api/threads/${threadId}?includeTurns=true`);
      renderThreadMessages(data);
      const found = state.threads.find(t => t.id === threadId);
      if (found && found.updatedAt) state.lastThreadUpdatedAt = Math.max(state.lastThreadUpdatedAt, found.updatedAt);
      if (!silent) setStatus(`Thread ${threadId.slice(0,8)} loaded`);
    }

    async function createThread() {
      setStatus('Creating thread...');
      const cwd = getConfiguredCwd();
      const data = await api('./api/threads/start', {
        method: 'POST',
        body: JSON.stringify({
          approvalPolicy: 'never',
          cwd: cwd || undefined,
        }),
      });
      const id = data?.thread?.id;
      if (!id) throw new Error('thread/start returned no id');
      state.selectedThreadId = id;
      await loadThreads();
      setStatus(`New thread ${id.slice(0,8)} created`);
    }

    async function resumeThread() {
      if (!state.selectedThreadId) return;
      setStatus('Resuming thread...');
      const cwd = getConfiguredCwd();
      await api(`./api/threads/${state.selectedThreadId}/resume`, {
        method: 'POST',
        body: JSON.stringify({ cwd: cwd || undefined }),
      });
      setStatus('Thread resumed');
    }

    async function sendMessage() {
      const text = el.input.value.trim();
      if (!text) return;
      if (!state.selectedThreadId) {
        await createThread();
      }
      if (state.busy) return;
      state.busy = true;
      el.sendBtn.disabled = true;

      try {
        pushMessage('user', text, 'pending');
        pushMessage('agent', 'Waiting for model response...', 'pending');
        el.input.value = '';
        setStatus('Sending...');

        const out = await api(`./api/threads/${state.selectedThreadId}/turns`, {
          method: 'POST',
          body: JSON.stringify({ text, wait: false }),
        });

        const turnId = out?.turn?.id || null;
        let read = out?.threadRead || null;
        if (read) {
          renderThreadMessages(read);
        }
        if (turnId) {
          read = await monitorTurnProgress(state.selectedThreadId, turnId);
        } else {
          read = await api(`./api/threads/${state.selectedThreadId}?includeTurns=true`);
          renderThreadMessages(read);
        }

        read = read || await api(`./api/threads/${state.selectedThreadId}?includeTurns=true`);
        renderThreadMessages(read);
        if (el.ttsAutoToggle.checked) {
          const lastAgent = extractLastAgentText(read);
          if (lastAgent) {
            try {
              await speakText(lastAgent);
            } catch (ttsErr) {
              setStatus(`TTS error: ${String(ttsErr)}`, true);
            }
          }
        }
        setStatus('Completed');
        await loadThreads();
        state.lastFailedMessage = null;
        el.retryBtn.style.display = 'none';
      } catch (err) {
        setStatus(String(err), true);
        state.lastFailedMessage = text;
        el.retryBtn.style.display = 'inline-block';
        pushMessage('agent', `Failed: ${String(err)}`, 'failed');
      } finally {
        state.busy = false;
        el.sendBtn.disabled = false;
      }
    }

    el.refreshBtn.onclick = () => loadThreads().catch(e => setStatus(String(e), true));
    el.openThreadsBtn.onclick = () => openThreadMenu();
    el.mobileActionsBtn.onclick = () => toggleMobileActions();
    el.headerActions.onclick = (e) => {
      if (!isMobileLayout()) return;
      const target = e.target;
      if (target instanceof HTMLElement && target.closest('button')) {
        closeMobileActions();
      }
    };
    el.closeThreadsBtn.onclick = () => closeThreadMenu();
    el.newThreadBtn.onclick = () => createThread().catch(e => setStatus(String(e), true));
    el.resumeBtn.onclick = () => resumeThread().catch(e => setStatus(String(e), true));
    el.searchInput.oninput = () => renderThreads();
    el.sendBtn.onclick = () => sendMessage();
    el.retryBtn.onclick = async () => {
      if (!state.lastFailedMessage) return;
      el.input.value = state.lastFailedMessage;
      await sendMessage();
    };
    el.input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    window.addEventListener('resize', () => {
      if (!isMobileLayout()) closeThreadMenu();
      if (!isMobileLayout()) closeMobileActions();
    });
    document.addEventListener('click', (e) => {
      if (!isMobileLayout()) return;
      if (!document.body.classList.contains('thread-menu-open')) return;
      if (el.sidebarPanel.contains(e.target) || el.openThreadsBtn.contains(e.target)) return;
      closeThreadMenu();
    });
    document.addEventListener('click', (e) => {
      if (!isMobileLayout()) return;
      if (!document.body.classList.contains('mobile-actions-open')) return;
      if (el.mobileActionsBtn.contains(e.target) || el.headerActions.contains(e.target)) return;
      closeMobileActions();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeThreadMenu();
        closeMobileActions();
      }
    });

    function resetAutoRefreshTimer() {
      if (state.autoRefreshTimer) clearInterval(state.autoRefreshTimer);
      state.autoRefreshTimer = setInterval(async () => {
        if (!el.autoRefreshToggle.checked || !state.selectedThreadId || state.busy) return;
        try {
          const cwd = getConfiguredCwd();
          const suffix = cwd ? `&cwd=${encodeURIComponent(cwd)}` : '';
          const delta = await api(`./api/threads?limit=50&sourceKinds=vscode&updatedAfter=${state.lastThreadUpdatedAt}${suffix}`);
          if ((delta.data || []).length > 0) {
            await loadThreads();
            await loadThread(state.selectedThreadId, true);
          }
        } catch (_err) {
          // Ignore transient poll errors; explicit actions still surface errors.
        }
      }, Math.max(800, Number(el.autoRefreshInterval.value) * 1000));
    }
    el.autoRefreshToggle.onchange = () => resetAutoRefreshTimer();
    el.autoRefreshInterval.onchange = () => resetAutoRefreshTimer();
    el.cwdInput.addEventListener('change', () => {
      saveCwd(el.cwdInput.value);
      loadThreads().catch(e => setStatus(String(e), true));
    });
    el.cwdInput.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      saveCwd(el.cwdInput.value);
      loadThreads().catch(err => setStatus(String(err), true));
    });
    el.ttsAutoToggle.onchange = () => {
      state.tts.enabled = el.ttsAutoToggle.checked;
    };
    function decodeThreadToken(value) {
      const raw = (value || '').trim();
      if (!raw) return '';
      try {
        return decodeURIComponent(raw).trim();
      } catch (_err) {
        return raw;
      }
    }
    function threadIdFromLocation() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const fromQuery = decodeThreadToken(params.get('thread_id') || params.get('threadId') || '');
        if (fromQuery) return fromQuery;

        const rawHash = String(window.location.hash || '').replace(/^#/, '').trim();
        if (!rawHash) return '';

        const queryIndex = rawHash.indexOf('?');
        if (queryIndex >= 0) {
          const hashParams = new URLSearchParams(rawHash.slice(queryIndex + 1));
          const fromHashQuery = decodeThreadToken(hashParams.get('thread_id') || hashParams.get('threadId') || '');
          if (fromHashQuery) return fromHashQuery;
        }

        const hashParams = new URLSearchParams(rawHash);
        const fromHashFlat = decodeThreadToken(hashParams.get('thread_id') || hashParams.get('threadId') || '');
        if (fromHashFlat) return fromHashFlat;

        const hashPathMatch = rawHash.match(/(?:^|\/)thread\/([^/?#]+)/i);
        if (hashPathMatch && hashPathMatch[1]) {
          return decodeThreadToken(hashPathMatch[1]);
        }
      } catch (_err) {
        return '';
      }
      return '';
    }
    purgeForbiddenButtons();
    new MutationObserver(() => purgeForbiddenButtons()).observe(document.body, { childList: true, subtree: true });
    try {
      const requestedThreadId = threadIdFromLocation();
      if (requestedThreadId) {
        state.requestedThreadId = requestedThreadId;
        state.selectedThreadId = requestedThreadId;
      }
      const rememberedCwd = (localStorage.getItem('codexChat.cwd') || '').trim();
      if (rememberedCwd) {
        state.cwd = rememberedCwd;
        el.cwdInput.value = rememberedCwd;
      }
    } catch (_err) {
      // Ignore storage failures.
    }
    resetAutoRefreshTimer();
    Promise.all([loadTtsConfig()]).finally(() => {
      loadThreads().catch(e => setStatus(String(e), true));
    });
  </script>
</body>
</html>
